name: Retrain

on:
  push:
    branches: [main]
    paths:
      - "pipeline/train_model.py"
      - "pipeline/predictive_maintenance.csv"

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Train model
        working-directory: pipeline
        run: python train_model.py

      - name: Report metrics
        run: |
          python - <<'EOF'
          import json, os
          m         = json.load(open("pipeline/outputs/metrics.json"))
          f1        = m["f1_macro"]
          acc       = m["accuracy"]
          threshold = float(os.getenv("F1_THRESHOLD", "0.70"))
          status    = "✅ PASSED" if f1 >= threshold else f"❌ FAILED (threshold {threshold})"
          lines = [
              "### Training Results",
              "",
              "| Metric | Value |",
              "|--------|-------|",
              f"| F1-macro | {f1:.4f} |",
              f"| Accuracy | {acc:.4f} |",
              f"| Promotion gate | {status} |",
          ]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as fh:
                  fh.write("\n".join(lines) + "\n")
          else:
              print("\n".join(lines))
          EOF
