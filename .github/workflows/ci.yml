name: CI
on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install pytest ruff black

      - name: Train model
        working-directory: pipeline
        run: python train_model.py

      - name: Ruff
        run: ruff check pipeline/

      - name: Black
        run: black --check pipeline/

      - name: Pytest
        run: python -m pytest pipeline/tests/ -q

      - name: Docker build
        run: docker build -t pipeline-api:${{ github.sha }} -f pipeline/Dockerfile pipeline/
